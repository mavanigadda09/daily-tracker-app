<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- FOUC PREVENTION (KEEP FIRST) -->
    <script>
      (function () {
        var VALID   = ["dark", "light", "system"];
        var DEFAULT = "dark";
        var saved   = "";
        try { saved = localStorage.getItem("theme") || ""; } catch (_) {}
        var theme = VALID.indexOf(saved) !== -1 ? saved : DEFAULT;
        if (theme === "system") {
          theme = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>

    <!-- PERFORMANCE: Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- GOOGLE FONTS -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Base -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="./manifest.webmanifest" />

    <!-- Theme colors -->
    <meta name="theme-color" content="#040710" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff"  media="(prefers-color-scheme: light)" />

    <!-- iOS PWA -->
    <link rel="apple-touch-icon" href="./pwa-192.png" />
    <meta name="apple-mobile-web-app-capable"          content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- App -->
    <meta name="description"      content="Track habits, tasks, goals, and finances — rise every day." />
    <meta name="application-name" content="Phoenix Tracker" />
    <meta name="mobile-web-app-capable" content="yes" />

    <title>Phoenix Tracker</title>

    <style>
      html {
        font-family: 'Rajdhani', system-ui, -apple-system, sans-serif;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
