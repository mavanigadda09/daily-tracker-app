<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!--
      FOUC PREVENTION — must be first script in <head>.
      Runs synchronously before first paint.
      Mirrors logic in utils/theme.js — keep in sync if themes change.
    -->
    <script>
      (function () {
        var VALID   = ["dark", "light", "system"];
        var DEFAULT = "dark";
        var saved   = "";
        try { saved = localStorage.getItem("theme") || ""; } catch (_) {}
        var theme = VALID.indexOf(saved) !== -1 ? saved : DEFAULT;
        if (theme === "system") {
          theme = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- FIX: was /manifest.json — file is named manifest.webmanifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <meta name="theme-color" content="#040710" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff"  media="(prefers-color-scheme: light)" />

    <link rel="apple-touch-icon" href="/pwa-192.png" />
    <meta name="apple-mobile-web-app-capable"          content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <meta name="description"      content="Track habits, tasks, goals, and finances — rise every day." />
    <meta name="application-name" content="Phoenix Tracker" />
    <meta name="mobile-web-app-capable" content="yes" />

    <title>Phoenix Tracker</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
