<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!--
      ✅ CHANGE 1 — FOUC PREVENTION (added, was missing)
      ─────────────────────────────────────────────────────────
      Must be the FIRST script in <head>, before any <link> or <style>.
      Runs synchronously before the browser paints a single pixel.
      This is the only reliable way to prevent theme flash in a
      client-side React app — doing it in main.jsx or useEffect is
      always too late.

      Logic mirrors utils/theme.js. If you add a new valid theme,
      update the VALID array here too.
    -->
    <script>
      (function () {
        var VALID   = ["dark", "light", "system"];
        var DEFAULT = "dark";
        var saved   = "";
        try { saved = localStorage.getItem("theme") || ""; } catch (_) {}
        var theme = VALID.indexOf(saved) !== -1 ? saved : DEFAULT;
        if (theme === "system") {
          theme = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>

    <!-- Favicon — unchanged -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Viewport — unchanged -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PWA Manifest — unchanged -->
    <link rel="manifest" href="/manifest.json" />

    <!--
      ✅ CHANGE 2 — theme-color now dual: dark + light (was single value)
      ─────────────────────────────────────────────────────────
      The `media` attribute lets browsers pick the right colour
      automatically, syncing the browser chrome with the active theme.
      Update the content values to match your CSS variables.

      REMOVED: <meta name="theme-color" content="#0f172a" />
      REPLACED WITH:
    -->
    <meta name="theme-color" content="#040710" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff"  media="(prefers-color-scheme: light)" />

    <!-- iOS PWA Support — unchanged -->
    <link rel="apple-touch-icon" href="/pwa-192.png" />
    <meta name="apple-mobile-web-app-capable"          content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- SEO + Install — unchanged -->
    <meta name="description"       content="Track habits, tasks, and goals daily" />
    <meta name="application-name"  content="Tracker App" />

    <!-- Mobile zoom prevention — unchanged -->
    <meta name="mobile-web-app-capable" content="yes" />

    <title>Phoenix Tracker</title>
  </head>

  <body>
    <div id="root"></div>

    <!-- Main app — unchanged -->
    <script type="module" src="/src/main.jsx"></script>

    <!--
      ✅ CHANGE 3 — SW registration removed from here (was in <body>)
      ─────────────────────────────────────────────────────────
      The full SW lifecycle (register, update detection, user prompt,
      skipWaiting, reload) now lives in src/utils/serviceWorker.js
      and is called from main.jsx via registerServiceWorker().

      Keeping SW registration here AND in main.jsx would double-register
      on every load. One registration point only.
    -->
  </body>
</html>
